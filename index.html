<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:300px;
    background:#222;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    margin:10px 0;
    padding:10px;
}

button{
    width:100%;
    padding:10px;
    background:red;
    color:white;
    border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwIndqHXpQEXSfOo1m8XRN12pWBD4pGZXYNiRsQE4OBJjz4b7ZOKSubgGZjXXZxSy5Aqw/exec";

async function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const res = await fetch(
    `${API}?action=login&username=${username}&password=${password}`
    );

    const data = await res.json();

    if(data.success){

        localStorage.setItem("login","true");

        window.location = "movies.html";

    }else{

        alert("Wrong Data");
    }
}

</script>

</body>
</html>
